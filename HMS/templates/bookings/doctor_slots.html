<h1>My Slots</h1>

<a href="{% url 'create_slot' %}">
    Create New Slot
</a>

<hr>

{% for slot in slots %}

    <p>
        {{ slot.start_time }}
        →
        {{ slot.end_time }}

        {% if slot.is_booked %}
            BOOKED
        {% else %}
            AVAILABLE
        {% endif %}
    </p>

{% empty %}

    <p>No slots yet.</p>

{% endfor %}
